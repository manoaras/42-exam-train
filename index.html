<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Exam Medium Python 42 — Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#141127;--bg-2:#100d20;--panel:#1e1a3a;--panel-2:#252048;--code-bg:#0e0c1c;
    --ink:#eceafa;--muted:#9c96c4;--vermilion:#ff5a3c;--gold:#f0c04a;--indigo:#8a82ff;
    --line:#302a54;--line-soft:#241f42;--ok:#66d69a;--warn:#f0c04a;--radius:16px;
    --accent:var(--gold);
  }
  body.view-official{--accent:var(--gold)}
  body.view-training{--accent:var(--vermilion)}

  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;
    font-family:"Space Grotesk",system-ui,-apple-system,sans-serif;
    background:
      radial-gradient(1100px 560px at 82% -8%, rgba(138,130,255,.15), transparent 60%),
      radial-gradient(820px 460px at -5% 2%, rgba(255,90,60,.10), transparent 55%),
      var(--bg);}
  .wrap{max-width:1280px;margin:0 auto;padding:0 22px}

  .toolbar{position:sticky;top:0;z-index:50;background:rgba(20,17,39,.82);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft)}
  .toolbar-inner{max-width:1280px;margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:13px;flex-wrap:wrap}
  .brand{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:.82rem;
    color:var(--ink);white-space:nowrap;display:flex;align-items:center;gap:8px}
  .brand .glyph{color:var(--accent);transition:color .25s}
  .seg{display:flex;border:1px solid var(--line);border-radius:99px;overflow:hidden;
    font-family:"JetBrains Mono",monospace;font-size:.71rem}
  .seg button{background:none;border:none;padding:7px 14px;color:var(--muted);cursor:pointer;
    font-family:inherit;font-size:inherit;transition:color .15s,background .2s}
  .seg button:hover{color:var(--ink)}
  .seg button.active{background:var(--accent);color:var(--bg);font-weight:700}
  .search{flex:1 1 130px;min-width:100px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;color:var(--ink);font-family:"Space Grotesk",sans-serif;font-size:.86rem;
    padding:8px 12px;outline:none;transition:border-color .15s}
  .search::placeholder{color:var(--muted)}
  .search:focus{border-color:var(--indigo)}
  .tbtn{background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--muted);
    font-family:"JetBrains Mono",monospace;font-size:.74rem;padding:8px 12px;cursor:pointer;
    white-space:nowrap;transition:all .15s}
  .tbtn:hover{color:var(--ink);border-color:var(--indigo)}
  .quiz-toggle{border-color:rgba(138,130,255,.5);color:var(--indigo)}
  .quiz-toggle:hover{background:rgba(138,130,255,.12);color:var(--ink)}

  .progress{display:flex;align-items:center;gap:9px;font-family:"JetBrains Mono",monospace;
    font-size:.74rem;color:var(--muted);white-space:nowrap}
  .stat{display:inline-flex;align-items:center;gap:3px}
  .stat.ok{color:var(--ok)}
  .stat.warn{color:var(--warn)}
  .bar{width:52px;height:5px;border-radius:99px;background:var(--line);overflow:hidden}
  .bar > i{display:block;height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,var(--ok),var(--indigo));transition:width .35s ease}
  .icon-btn{background:none;border:1px solid var(--line);border-radius:8px;color:var(--muted);
    width:26px;height:26px;cursor:pointer;font-size:.85rem;line-height:1;transition:all .15s}
  .icon-btn:hover{color:var(--vermilion);border-color:var(--vermilion)}

  body.mode-quiz .seg,
  body.mode-quiz .search,
    body.mode-quiz .progress{display:none}

  header.hero{padding:52px 0 8px}
  .kicker{font-family:"JetBrains Mono",monospace;font-size:.76rem;letter-spacing:.18em;
    text-transform:uppercase;color:var(--accent);margin-bottom:14px;transition:color .25s}
  h1{font-size:2.6rem;line-height:1.08;margin:0 0 14px;font-weight:700;letter-spacing:-.025em}
  .sub{color:var(--muted);max-width:64ch;margin:0}
  .sub code{font-family:"JetBrains Mono",monospace;color:var(--gold);
    background:rgba(240,192,74,.1);padding:1px 6px;border-radius:5px;font-size:.85em}
  .sub b{color:var(--ok);font-weight:500}


  .rank-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:22px 0 0}
  .rank-tabs button{background:var(--panel);border:1px solid var(--line);border-radius:99px;
    color:var(--muted);font-family:"JetBrains Mono",monospace;font-size:.72rem;padding:7px 14px;
    cursor:pointer;transition:all .15s}
  .rank-tabs button:hover:not(:disabled){color:var(--ink);border-color:var(--indigo)}
  .rank-tabs button.active{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:700}
  .rank-tabs button:disabled{opacity:.38;cursor:not-allowed}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(560px,1fr));gap:20px;align-items:start;margin-top:14px}
  .grid .section-title{grid-column:1 / -1;font-family:"JetBrains Mono",monospace;font-size:.85rem;
    letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:32px 0 2px;padding-bottom:10px;
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .grid .section-title:first-child{margin-top:12px}
  .grid .section-title .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex:none}
  .grid .section-title .count{margin-left:auto;font-size:.72rem;color:#5c5688}

  .card{background:linear-gradient(180deg,var(--panel),var(--bg) 260%);border:1px solid var(--line);
    border-radius:var(--radius);padding:24px 24px 20px;position:relative;overflow:hidden;
    transition:border-color .2s}
  .card:hover{border-color:#3d3668}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
    background:linear-gradient(var(--accent),var(--indigo))}
  .head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:4px}
  .num{font-family:"JetBrains Mono",monospace;font-weight:700;color:var(--accent);font-size:1.05rem}
  .title{font-size:1.2rem;font-weight:600;margin:0;letter-spacing:-.01em}
  .title .file{font-family:"JetBrains Mono",monospace;font-size:.9rem;color:var(--ink);font-weight:500}
  .tag{font-family:"JetBrains Mono",monospace;font-size:.71rem;color:var(--gold);
    border:1px solid rgba(240,192,74,.35);padding:3px 9px;border-radius:20px;white-space:nowrap}
  .badge-real{font-family:"JetBrains Mono",monospace;font-size:.67rem;color:var(--bg);
    background:var(--gold);font-weight:700;padding:3px 9px;border-radius:20px;
    white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
  .status{font-family:"JetBrains Mono",monospace;font-size:.67rem;padding:3px 9px;border-radius:20px;
    white-space:nowrap;border:1px solid transparent}
  .status[hidden]{display:none}
  .status.ok{color:var(--ok);border-color:rgba(102,214,154,.4);background:rgba(102,214,154,.08)}
  .status.warn{color:var(--warn);border-color:rgba(240,192,74,.4);background:rgba(240,192,74,.08)}
  .status.seen{color:var(--muted);border-color:var(--line)}
  .analogy{color:var(--muted);font-style:italic;margin:12px 0 16px;padding-left:14px;border-left:2px solid var(--line)}
  ul.consigne{margin:12px 0;padding-left:20px}
  ul.consigne li{margin:5px 0}
  ul.consigne code, p code, .analogy code{font-family:"JetBrains Mono",monospace;font-size:.85em;
    background:rgba(138,130,255,.15);color:#cdc8ff;padding:1px 6px;border-radius:5px}

  pre{background:var(--code-bg);border:1px solid var(--line);border-radius:10px;padding:16px 18px;
    overflow-x:auto;margin:14px 0;font-family:"JetBrains Mono",monospace;font-size:.84rem;
    line-height:1.65;color:#dcd8f2}
  pre .c{color:#716b9c}pre .k{color:var(--vermilion)}pre .s{color:var(--gold)}pre .f{color:var(--indigo)}
  .proto{border-color:rgba(240,192,74,.28)}

  details.sol{margin-top:16px;border:1px solid var(--line);border-radius:10px;background:var(--panel-2);overflow:hidden}
  details.sol > summary{cursor:pointer;list-style:none;user-select:none;padding:13px 18px;
    font-family:"JetBrains Mono",monospace;font-size:.85rem;font-weight:500;color:var(--ok);
    display:flex;align-items:center;gap:10px;transition:background .15s}
  details.sol > summary:hover{background:rgba(102,214,154,.08)}
  details.sol > summary::-webkit-details-marker{display:none}
  .chev{display:inline-block;transition:transform .2s;color:var(--ok);font-size:.9rem}
  details[open] .chev{transform:rotate(90deg)}
  details[open] > summary{border-bottom:1px solid var(--line)}
  .summary-hint{margin-left:auto;color:var(--muted);font-size:.72rem;font-weight:400}
  details[open] .summary-hint{display:none}
  .sol-body{padding:4px 18px 18px}
  .code-wrap{position:relative}
  .copy-btn{position:absolute;top:22px;right:10px;z-index:2;background:var(--panel);
    border:1px solid var(--line);border-radius:7px;color:var(--muted);
    font-family:"JetBrains Mono",monospace;font-size:.68rem;padding:4px 9px;cursor:pointer;
    opacity:0;transition:opacity .15s,color .15s}
  .code-wrap:hover .copy-btn{opacity:1}
  .copy-btn:hover{color:var(--ok);border-color:var(--ok)}
  .copy-btn.done{color:var(--ok);opacity:1}
  .sol-note{color:var(--muted);font-size:.92rem;margin:12px 0 0}
  .sol-note b{color:var(--ink);font-weight:500}

  .empty{display:none;text-align:center;color:var(--muted);font-family:"JetBrains Mono",monospace;
    font-size:.85rem;padding:40px 0}
  .empty.show{display:block}

  footer{margin:48px 0 72px;text-align:center;color:var(--muted);font-family:"JetBrains Mono",monospace;font-size:.8rem}
  footer .v{color:var(--accent)}

  /* ---------- QUIZ ---------- */
  .quiz{max-width:700px;margin:0 auto;padding:44px 0 72px}
  .quiz h2{font-size:1.9rem;margin:0 0 6px;letter-spacing:-.02em}
  .quiz-lead{color:var(--muted);margin:0 0 26px}
  .q-field{margin:0 0 20px}
  .q-field > label{display:block;font-family:"JetBrains Mono",monospace;font-size:.72rem;
    letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
  .segroup{display:inline-flex;flex-wrap:wrap;gap:8px}
  .segroup button{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    color:var(--muted);font-family:"JetBrains Mono",monospace;font-size:.8rem;padding:9px 15px;
    cursor:pointer;transition:all .15s}
  .segroup button:hover{color:var(--ink);border-color:var(--indigo)}
  .segroup button.active{background:var(--indigo);border-color:var(--indigo);color:var(--bg);font-weight:700}
  .q-start,.q-primary{margin-top:10px;background:var(--accent);border:none;border-radius:12px;
    color:var(--bg);font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:.98rem;
    padding:13px 22px;cursor:pointer;transition:transform .12s,filter .15s}
  .q-start:hover,.q-primary:hover{filter:brightness(1.08)}
  .q-start:active,.q-primary:active{transform:translateY(1px)}

  .q-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .q-count{font-family:"JetBrains Mono",monospace;font-size:.8rem;color:var(--muted)}
  .q-timer{font-family:"JetBrains Mono",monospace;font-size:1.5rem;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
  .q-timer.danger{color:var(--warn)}
  .q-timer.over{color:var(--vermilion)}
  .q-bar{height:5px;border-radius:99px;background:var(--line);overflow:hidden;margin-bottom:22px}
  .q-bar > i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--indigo));transition:width .3s}
  .q-card{padding:26px}
  .q-solution{margin-top:16px;border-top:1px solid var(--line);padding-top:8px}
  .q-actions{display:flex;gap:12px;align-items:center;margin-top:20px;flex-wrap:wrap}
  .ghost{background:none;border:1px solid var(--line);border-radius:12px;color:var(--muted);
    font-family:"Space Grotesk",sans-serif;font-size:.9rem;padding:12px 18px;cursor:pointer;transition:all .15s}
  .ghost:hover{color:var(--ink);border-color:var(--indigo)}
  .q-verdict{display:flex;gap:12px;align-items:center;margin-top:20px;flex-wrap:wrap}
  .q-verdict-label{color:var(--muted);font-size:.92rem;margin-right:4px}
  .q-verdict button{border:none;border-radius:12px;font-family:"Space Grotesk",sans-serif;
    font-weight:600;font-size:.92rem;padding:11px 18px;cursor:pointer;transition:filter .15s,transform .12s}
  .q-verdict button:active{transform:translateY(1px)}
  .q-verdict .ok{background:var(--ok);color:var(--bg)}
  .q-verdict .warn{background:var(--warn);color:var(--bg)}

  .quiz-results{text-align:center}
  .ring{width:150px;height:150px;margin:0 auto 6px;display:block}
  .ring-bg{fill:none;stroke:var(--line);stroke-width:10}
  .ring-fg{fill:none;stroke:var(--ok);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
  .ring-text{fill:var(--ink);font-family:"JetBrains Mono",monospace;font-size:26px;font-weight:700;text-anchor:middle}
  .results-time{color:var(--muted);font-family:"JetBrains Mono",monospace;margin:0 0 22px}
  .review-list{text-align:left;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
    padding:16px 20px;margin:0 auto 24px;max-width:440px}
  .review-list h3{font-family:"JetBrains Mono",monospace;font-size:.78rem;letter-spacing:.08em;
    text-transform:uppercase;color:var(--warn);margin:0 0 10px}
  .review-list ul{margin:0;padding-left:18px;color:var(--muted)}
  .review-list li{margin:4px 0}
  .review-list code{font-family:"JetBrains Mono",monospace;color:#cdc8ff}
  .quiz-results .q-actions{justify-content:center}

  
  @media (max-width:640px){.grid{grid-template-columns:1fr}}
  .card{cursor:pointer}
  .card .hint-open{font-family:"JetBrains Mono",monospace;font-size:.72rem;color:var(--ok);margin-top:14px}
  .overlay{position:fixed;inset:0;z-index:100;background:rgba(10,8,22,.72);
    backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px}
  .overlay[hidden]{display:none}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    max-width:760px;width:100%;max-height:86vh;overflow:auto;padding:26px 28px;position:relative}
  .modal-close{position:absolute;top:14px;right:14px;background:none;border:1px solid var(--line);
    border-radius:8px;color:var(--muted);width:30px;height:30px;cursor:pointer;font-size:1rem}
  .modal-close:hover{color:var(--vermilion);border-color:var(--vermilion)}
  .modal h2{margin:0 0 4px;font-size:1.3rem}
  .modal .sol-note{margin-top:14px}

  @media (max-width:620px){
    header.hero{padding:36px 0 4px}h1{font-size:2rem}
    .brand span.long{display:none}
    .switch .switch-label{display:none}
    .quiz h2{font-size:1.5rem}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="brand"><span class="glyph">◆</span><span class="long">Exam Python · 42</span></div>
    <div class="seg" role="tablist" aria-label="Choix de la vue">
      <button type="button" data-view="official" class="active" role="tab">Officiels</button>
      <button type="button" data-view="training" role="tab">Entraînement</button>
    </div>
    <input id="search" class="search" type="search" placeholder="Filtrer…" aria-label="Filtrer les exercices">
    <button type="button" class="tbtn quiz-toggle" id="quiz-toggle">▶ Mode quiz</button>
    <div class="progress" id="progress" title="Maîtrise : réussis / à revoir">
      <span class="stat ok">✓<b id="stat-success">0</b></span>
      <span class="stat warn">↻<b id="stat-review">0</b></span>
      <span class="bar"><i id="progress-bar"></i></span>
      <span id="progress-total" hidden>0</span>
      <button class="icon-btn" id="reset-progress" type="button" title="Réinitialiser la progression">⟳</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div id="browse">
    <header class="hero">
      <div class="kicker" id="hero-kicker"></div>
      <h1 id="hero-h1"></h1>
      <p class="sub" id="hero-sub"></p>
    </header>

    <div class="rank-tabs" id="rank-tabs"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">Aucun exercice ne correspond à ce filtre.</div>

    <footer id="footer"></footer>
  </div>

  <section id="quiz" class="quiz" hidden></section>
</div>

<div class="overlay" id="overlay" hidden>
  <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
</div>
<div hidden>
</div>

<script>
"use strict";
/* =========================================================================
   Rank 04 · Exam Medium Python — Trainer (TypeScript source)
   Un seul site, deux vues (Officiels / Entraînement) + un mode quiz.
   Piloté par les données : pour ajouter un exercice, ajoute un objet à
   EXERCISES — la grille, les sections, le filtre et le quiz s'adaptent seuls.
   ========================================================================= */
const HERO = {
    official: {
        kicker: "Sujets officiels · Exam Medium Python",
        h1: "Exercices officiels",
        sub: `Les sujets <b>réellement tombés</b> à ton exam medium (rank 04). Tente-les en conditions, puis révèle la <b>solution la plus courte</b>.`,
    },
    training: {
        kicker: "Entraînement · Exam Medium Python",
        h1: "Exercices d'entraînement",
        sub: `Des exercices dans le <b>format de l'exam</b>, rangés par concept, pour muscler tes réflexes. Solutions masquées, en <b>version la plus courte</b>.`,
    },
};
/* ---- Données des exercices -------------------------------------------- */
const EXERCISES = [
    /* ============ OFFICIELS ============ */
    {
        view: "official", section: "Sujets tombés à l'exam", num: "01",
        heading: `<span class="file">is_rotation.py</span>`,
        tag: "doubled list trick",
        analogy: `🎡 Une roue qui tourne : colle-la deux fois bout à bout, et toute rotation devient une simple tranche continue dans cette roue doublée.`,
        brief: [
            `Détermine si <code>arr2</code> est une rotation de <code>arr1</code> (à gauche ou à droite).`,
            `Longueurs différentes → <code>False</code>. Deux listes vides → <code>True</code>.`,
            `Exemple : <code>is_rotation([1,2,3,4,5], [4,5,1,2,3])</code> → <code>True</code>`,
        ],
        signature: `def is_rotation(arr1: list, arr2: list) -> bool:`,
        solution: `def is_rotation(arr1: list, arr2: list) -> bool:
    if len(arr1) != len(arr2):
        return False

    double = arr1 + arr1

    return any(double[i:i+len(arr2)] == arr2 for i in range(len(arr1)))


print(is_rotation([1, 2, 3, 4, 5], [4, 5, 1, 2, 3]))  # True
print(is_rotation([1, 2, 3, 4, 5], [3, 4, 5, 1, 2]))  # True
print(is_rotation([1, 2, 3, 4, 5], [2, 3, 4, 5, 6]))  # False
print(is_rotation([1, 2, 3, 4, 5], [1, 2, 3, 4]))     # False`,
        note: `<b>Le trick à connaître :</b> coller la liste à elle-même (<code>arr1 + arr1</code>) fait apparaître <b>toutes</b> les rotations possibles comme sous-tranches consécutives. Il suffit de vérifier si <code>arr2</code> en est une — même trick que pour la rotation de strings (<code>s2 in s1+s1</code>).`,
        search: "is_rotation rotation liste doubled list trick",
    },
    {
        view: "official", section: "Sujets tombés à l'exam", num: "02",
        heading: `<span class="file">constellation_mapper.py</span>`,
        tag: "grid + tuple unpack",
        analogy: `🌌 Une carte du ciel : tu poses une grille vide de points, puis tu allumes une étoile à chaque coordonnée — en ignorant celles hors du cadre.`,
        brief: [
            `Construit une grille <code>size</code> × <code>size</code> de <code>"."</code>, avec un <code>"*"</code> à chaque coordonnée <code>(ligne, colonne)</code> fournie.`,
            `Ignore les coordonnées hors-grille et les doublons.`,
            `Exemple : <code>constellation_mapper([(0,0),(1,1),(2,2)], 3)</code> → <code>["*..", ".*.", "..*"]</code>`,
        ],
        signature: `def constellation_mapper(stars: list[tuple[int, int]], size: int) -> list[str]:`,
        solution: `def constellation_mapper(stars: list[tuple[int, int]], size: int) -> list[str]:
    grid = [['.'] * size for _ in range(size)]

    for row, col in stars:
        if 0 <= row < size and 0 <= col < size:
            grid[row][col] = '*'

    return [''.join(line) for line in grid]


print(constellation_mapper([(0, 0), (1, 1), (2, 2)], 3))
# output: ['*..', '.*.', '..*']

print(constellation_mapper([(0, 0), (1, 2), (3, 4)], 3))
# output: ['*..', '..*', '...']

print(constellation_mapper([(0, 0), (1, 2), (3, 4)], 4))
# output: ['*...', '..*.', '....', '....']

/* ---- Coloration syntaxique Python ------------------------------------- */
const KW = ["def", "class", "if", "elif", "else", "return", "for", "while", "in", "not", "or", "and", "None", "True", "False", "from", "import", "lambda"];
const FN = ["sorted", "set", "len", "max", "min", "sum", "zip", "range", "ord", "chr", "append", "pop", "items", "isalpha", "isupper", "Counter", "intersection", "get", "any", "join", "print", "list", "tuple", "dict", "float", "bool", "str", "int"];
const S0 = "\uE000", S1 = "\uE001", K0 = "\uE100", K1 = "\uE101", F0 = "\uE200", F1 = "\uE201";
function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function highlightLine(line) {
    let code = line, comment = "";
    const h = line.indexOf("#");
    if (h >= 0) {
        code = line.slice(0, h);
        comment = line.slice(h);
    }
    let s = esc(code);
    const strings = [];
    s = s.replace(/"[^"]*"|'[^']*'/g, (m) => { strings.push(m); return S0 + (strings.length - 1) + S1; });
    s = s.replace(new RegExp("\\b(" + KW.join("|") + ")\\b", "g"), (m) => K0 + m + K1);
    s = s.replace(new RegExp("\\b(" + FN.join("|") + ")\\b", "g"), (m) => F0 + m + F1);
    s = s.replace(new RegExp(S0 + "(\\d+)" + S1, "g"), (_m, i) => `<span class="s">${strings[+i]}</span>`);
    s = s.split(K0).join(`<span class="k">`).split(K1).join("</span>");
    s = s.split(F0).join(`<span class="f">`).split(F1).join("</span>");
    if (comment)
        s += `<span class="c">${esc(comment)}</span>`;
    return s;
}
function highlight(code) {
    return code.split("\n").map(highlightLine).join("\n");
}

    for (const sec of sections) {
        const items = list.filter((e) => e.section === sec);
        html += `<div class="section-title"><span class="dot"></span>${sec}<span class="count">${items.length} exo${items.length > 1 ? "s" : ""}</span></div>`;
        html += items.map(cardHTML).join("");
    }
    grid.innerHTML = html;
    renderTabs();
    heroKicker.textContent = HERO[view].kicker;
    heroH1.textContent = HERO[view].h1;
    heroSub.innerHTML = HERO[view].sub;
    footerEl.innerHTML = `${list.length} exercices · <span class="v">versions courtes</span> — bon courage pour l'exam 🍜`;
    applySearch();
    refreshStats();
}
/* ---- Interactions (mode navigation) ----------------------------------- */
segButtons.forEach((btn) => {
    btn.addEventListener("click", () => {
        const v = btn.dataset.view;
        if (v === view)
            return;
        view = v;
        document.body.classList.toggle("view-official", view === "official");
        document.body.classList.toggle("view-training", view === "training");
        segButtons.forEach((b) => b.classList.toggle("active", b.dataset.view === view));
        searchInput.value = "";
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
    });
});
searchInput.addEventListener("input", applySearch);
resetBtn.addEventListener("click", () => {
    if (!confirm("Réinitialiser toute ta progression (réussis, à revoir, vus) ?"))
        return;
    progress = {};
    saveProgress();
    render();
});
grid.addEventListener("click", (e) => {
    const card = e.target.closest(".card");
    if (!card || !card.dataset.id)
        return;
    const ex = EXERCISES.find((x) => exId(x) === card.dataset.id);
    if (ex)
        openModal(ex);
});
grid.addEventListener("keydown", (e) => {
    if (e.key !== "Enter" && e.key !== " ")
        return;
    const card = e.target.closest(".card");
    if (!card || !card.dataset.id)
        return;
    e.preventDefault();
    const ex = EXERCISES.find((x) => exId(x) === card.dataset.id);
    if (ex)
        openModal(ex);
});
overlayEl.addEventListener("click", (e) => {
    const t = e.target;
    if (t === overlayEl || t.classList.contains("modal-close")) {
        closeModal();
        return;
    }
    if (t.classList.contains("copy-btn")) {
        const pre = t.parentElement.querySelector("pre");
        navigator.clipboard.writeText(pre.innerText).then(() => {
            t.textContent = "✓ Copié";
            t.classList.add("done");
            setTimeout(() => { t.textContent = "Copier"; t.classList.remove("done"); }, 1500);
        });
    }
});
document.addEventListener("keydown", (e) => { if (e.key === "Escape" && !overlayEl.hidden)
    closeModal(); });
let quiz = null;
let lastConfig = { source: "official", order: "ordered", perMs: 300000 };
function q(sel) { return quizEl.querySelector(sel); }
function fmtClock(ms) {
    const s = Math.max(0, Math.round(ms / 1000));
    const m = Math.floor(s / 60);
    return `${String(m).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
}
function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}
function enterQuiz() {
    document.body.classList.add("mode-quiz");
    browseEl.hidden = true;
    quizEl.hidden = false;
    quizToggle.textContent = "✕ Quitter le quiz";
    lastConfig.source = view;
    renderSetup();
    window.scrollTo({ top: 0, behavior: "smooth" });
}
function exitQuiz() {
    if (quiz && quiz.timerId)
        clearInterval(quiz.timerId);
    quiz = null;
    document.body.classList.remove("mode-quiz");
    quizEl.hidden = true;
    browseEl.hidden = false;
    quizToggle.textContent = "▶ Mode quiz";
    render(); // reflète les nouveaux statuts sur les cartes
}
function renderSetup() {
    const s = lastConfig.source, o = lastConfig.order, t = String(lastConfig.perMs / 1000);
    const on = (a, b) => (a === b ? " active" : "");
    quizEl.innerHTML = `<div class="quiz-setup">
    <h2>Mode quiz</h2>
    <p class="quiz-lead">Conditions d'exam : un exercice à la fois, solution cachée, minuteur. À la fin, ton score — et les exercices « à revoir » sont mémorisés.</p>
    <div class="q-field"><label>Source</label><div class="segroup" data-group="source">
      <button type="button" data-val="official" class="${on(s, "official").trim()}">Officiels</button>
      <button type="button" data-val="training" class="${on(s, "training").trim()}">Entraînement</button>
      <button type="button" data-val="all" class="${on(s, "all").trim()}">Tout</button></div></div>
    <div class="q-field"><label>Ordre</label><div class="segroup" data-group="order">
      <button type="button" data-val="ordered" class="${on(o, "ordered").trim()}">Dans l'ordre</button>
      <button type="button" data-val="shuffle" class="${on(o, "shuffle").trim()}">Aléatoire</button></div></div>
    <div class="q-field"><label>Temps / exercice</label><div class="segroup" data-group="time">
      <button type="button" data-val="0" class="${on(t, "0").trim()}">Aucun</button>
      <button type="button" data-val="180" class="${on(t, "180").trim()}">3 min</button>
      <button type="button" data-val="300" class="${on(t, "300").trim()}">5 min</button>
      <button type="button" data-val="600" class="${on(t, "600").trim()}">10 min</button></div></div>
    <button type="button" class="q-start" id="q-start">Démarrer le quiz →</button>
  </div>`;
    quizEl.querySelectorAll(".segroup").forEach((group) => {
        group.querySelectorAll("button").forEach((b) => {
            b.addEventListener("click", () => {
                group.querySelectorAll("button").forEach((x) => x.classList.remove("active"));
                b.classList.add("active");
            });
        });
    });
    q("#q-start").addEventListener("click", () => {
        const val = (grp) => {
            const b = quizEl.querySelector(`[data-group="${grp}"] button.active`);
            return (b === null || b === void 0 ? void 0 : b.dataset.val) || "";
        };
        lastConfig = {
            source: (val("source") || "official"),
            order: (val("order") || "ordered"),
            perMs: (parseInt(val("time"), 10) || 0) * 1000,
        };
        startQuiz(lastConfig);
    });
}
function startQuiz(cfg) {
    let pool = cfg.source === "all" ? EXERCISES.slice() : EXERCISES.filter((e) => e.view === cfg.source);
    if (cfg.only)
        pool = pool.filter((e) => cfg.only.includes(exId(e)));
    if (cfg.order === "shuffle")
        shuffle(pool);
    if (pool.length === 0) {
        renderSetup();
        return;
    }
    quiz = { queue: pool, index: 0, revealed: false, results: {}, perMs: cfg.perMs, startedAt: 0, elapsedTotal: 0, timerId: null };
    renderQuestion();
}
function startTimer() {
    if (!quiz)
        return;
    quiz.startedAt = Date.now();
    if (quiz.timerId) {
        clearInterval(quiz.timerId);
        quiz.timerId = null;
    }
    const el = q("#q-timer");
    if (quiz.perMs <= 0) {
        if (el)
            el.textContent = "∞";
        return;
    }
    const tick = () => {
        if (!quiz)
            return;
        const remaining = quiz.perMs - (Date.now() - quiz.startedAt);
        const e = q("#q-timer");
        if (e) {
            e.textContent = fmtClock(remaining);
            e.classList.toggle("danger", remaining <= 30000 && remaining > 0);
            e.classList.toggle("over", remaining <= 0);
        }
    };
    tick();
    quiz.timerId = window.setInterval(tick, 250);
}
function stopTimer() {
    if (!quiz)
        return;
    if (quiz.timerId) {
        clearInterval(quiz.timerId);
        quiz.timerId = null;
    }
    quiz.elapsedTotal += Date.now() - quiz.startedAt;
}
function renderQuestion() {
    if (!quiz)
        return;
    if (quiz.index >= quiz.queue.length) {
        renderResults();
        return;
    }
    const ex = quiz.queue[quiz.index];
    const badge = ex.badge ? `<span class="badge-real">${ex.badge}</span>` : "";
    const bullets = ex.brief.map((b) => `<li>${b}</li>`).join("");
    const pct = (quiz.index / quiz.queue.length) * 100;
    quiz.revealed = false;
    quizEl.innerHTML = `<div class="quiz-run">
    <div class="q-top">
      <span class="q-count">Exercice ${quiz.index + 1} / ${quiz.queue.length}</span>
      <span class="q-timer" id="q-timer">—</span>
    </div>
    <div class="q-bar"><i style="width:${pct}%"></i></div>
    <article class="card q-card">
      <div class="head">
        <span class="num">${ex.num}</span>
        <h2 class="title">${ex.heading}</h2>
        ${badge}<span class="tag">${ex.tag}</span>
      </div>
      <p class="analogy">${ex.analogy}</p>
      <pre class="proto">${highlight(ex.signature)}</pre>
      <ul class="consigne">${bullets}</ul>
      <div class="q-solution" id="q-solution" hidden>
        <div class="code-wrap"><button class="copy-btn" type="button">Copier</button><pre>${highlight(ex.solution)}</pre></div>
        <p class="sol-note">${ex.note}</p>
      </div>
      <div class="q-actions" id="q-actions">
        <button type="button" class="q-primary" id="q-reveal">Révéler la solution</button>
        <button type="button" class="ghost" id="q-skip">Passer</button>
      </div>
      <div class="q-verdict" id="q-verdict" hidden>
        <span class="q-verdict-label">Comment t'en es-tu sorti ?</span>
        <button type="button" class="ok" id="q-success">✓ Réussi</button>
        <button type="button" class="warn" id="q-review">✗ À revoir</button>
      </div>
    </article>
  </div>`;
    q("#q-reveal").addEventListener("click", reveal);
    q("#q-skip").addEventListener("click", () => nextWith("skip"));
    q("#q-success").addEventListener("click", () => nextWith("success"));
    q("#q-review").addEventListener("click", () => nextWith("review"));
    startTimer();
}
function reveal() {
    if (!quiz || quiz.revealed)
        return;
    quiz.revealed = true;
    stopTimer();
    const sol = q("#q-solution"), act = q("#q-actions"), ver = q("#q-verdict");
    if (sol)
        sol.hidden = false;
    if (act)
        act.hidden = true;
    if (ver)
        ver.hidden = false;
}
function nextWith(v) {
    if (!quiz)
        return;
    if (!quiz.revealed)
        stopTimer(); // "Passer" avant d'avoir révélé
    const ex = quiz.queue[quiz.index];
    quiz.results[exId(ex)] = v;
    if (v === "success" || v === "review")
        setStatus(exId(ex), v);
    quiz.index++;
    renderQuestion();
}
function renderResults() {
    if (!quiz)
        return;
    const total = quiz.queue.length;
    let success = 0;
    const toReview = [];
    for (const ex of quiz.queue) {
        const v = quiz.results[exId(ex)];
        if (v === "success")
            success++;
        else
            toReview.push(ex);
    }
    const pct = Math.round((success / total) * 100);
    const C = 2 * Math.PI * 52;
    const offset = C * (1 - pct / 100);
    const reviewHTML = toReview.length
        ? `<div class="review-list"><h3>À revoir (${toReview.length})</h3><ul>${toReview.map((e) => `<li><code>${e.heading.replace(/<[^>]+>/g, "")}</code></li>`).join("")}</ul></div>`
        : `<p class="results-time" style="color:var(--ok)">Sans faute — impeccable ! 🎉</p>`;
    const redoBtn = toReview.length
        ? `<button type="button" class="ghost" id="q-redo">Rejouer les ${toReview.length} ratés</button>`
        : "";
    quizEl.innerHTML = `<div class="quiz-results">
    <svg class="ring" viewBox="0 0 120 120">
      <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
      <circle class="ring-fg" cx="60" cy="60" r="52" transform="rotate(-90 60 60)"
        style="stroke-dasharray:${C.toFixed(1)};stroke-dashoffset:${offset.toFixed(1)}"></circle>
      <text class="ring-text" x="60" y="69">${pct}%</text>
    </svg>
    <h2>${success} / ${total} réussis</h2>
    <p class="results-time">Temps total : ${fmtClock(quiz.elapsedTotal)}</p>
    ${reviewHTML}
    <div class="q-actions">
      <button type="button" class="q-primary" id="q-restart">Recommencer</button>
      ${redoBtn}
      <button type="button" class="ghost" id="q-quit">Retour aux exercices</button>
    </div>
  </div>`;
    const reviewIds = toReview.map(exId);
    q("#q-restart").addEventListener("click", () => startQuiz(lastConfig));
    q("#q-quit").addEventListener("click", exitQuiz);
    const redo = q("#q-redo");
    if (redo)
        redo.addEventListener("click", () => startQuiz({ ...lastConfig, order: "ordered", only: reviewIds }));
    quiz = null; // le quiz est terminé ; les stats sont déjà sauvegardées
}
// copier depuis la solution révélée en quiz
quizEl.addEventListener("click", (e) => {
    const t = e.target;
    if (!t.classList.contains("copy-btn"))
        return;
    const pre = t.parentElement.querySelector("pre");
    navigator.clipboard.writeText(pre.innerText).then(() => {
        t.textContent = "✓ Copié";
        t.classList.add("done");
        setTimeout(() => { t.textContent = "Copier"; t.classList.remove("done"); }, 1500);
    });
});
// raccourcis clavier en quiz : Entrée/Espace = révéler, 1 = réussi, 2 = à revoir
document.addEventListener("keydown", (e) => {
    if (!document.body.classList.contains("mode-quiz") || !quiz)
        return;
    if (e.key === "Enter" || e.key === " ") {
        if (!quiz.revealed && q("#q-reveal")) {
            e.preventDefault();
            reveal();
        }
    }
    else if (quiz.revealed && e.key === "1") {
        nextWith("success");
    }
    else if (quiz.revealed && e.key === "2") {
        nextWith("review");
    }
});
quizToggle.addEventListener("click", () => {
    if (document.body.classList.contains("mode-quiz"))
        exitQuiz();
    else
        enterQuiz();
});
/* ---- Démarrage --------------------------------------------------------- */
document.body.classList.add("view-official");
render();

</script>
</body>
</html>
